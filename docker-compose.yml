version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: aeroshield-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aeroshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: aeroshield-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aeroshield.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # We will add frontend and backend services later once we dockerize them.
  # For local dev, we will run them natively using npm and uvicorn.

volumes:
  postgres_data:
